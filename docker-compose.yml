version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Padrão busca do .env (Configurado para SQLite no .env.example)
      - DATABASE_URL=${DATABASE_URL}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - ACCESS_SIGN_EXPIRES_IN=${ACCESS_SIGN_EXPIRES_IN:-15m}
      - REFRESH_SIGN_EXPIRES_IN=${REFRESH_SIGN_EXPIRES_IN:-7d}
    volumes:
      # Persiste o banco SQLite se estiver sendo usado dentro do container
      - .:/app/data
